name: Destroy OpenFaaS Function

on:
  workflow_dispatch:

jobs:
  destroy:
    runs-on: ubuntu-latest

    steps:
      - name: Install faas-cli
        run: curl -sSL https://cli.openfaas.com | sudo sh

      - name: Login to OpenFaaS
        run: |
          echo "${{ secrets.OPENFAAS_PASSWORD }}" | faas-cli login \
          --username admin \
          --password-stdin \
          --gateway ${{ secrets.OPENFAAS_URL }}

      - name: Remove function
        run: |
          faas-cli remove hello-fn --gateway ${{ secrets.OPENFAAS_URL }}
